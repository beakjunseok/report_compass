<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Report Compass</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans+KR:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --paper:#F3F5F4;
    --paper-line: rgba(20,40,38,0.07);
    --ink:#16232B;
    --ink-soft:#4A5A5C;
    --copper:#C1682B;
    --copper-soft:#E7B98C;
    --teal:#2F6E5E;
    --teal-soft:#CFE3DC;
    --card:#FFFFFF;
    --border: rgba(22,35,43,0.14);
    --danger:#B3402F;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background-color:var(--paper);
    background-image:
      linear-gradient(var(--paper-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--paper-line) 1px, transparent 1px);
    background-size: 24px 24px;
    color:var(--ink);
    font-family:'IBM Plex Sans KR', sans-serif;
    min-height:100vh;
  }
  .mono{font-family:'IBM Plex Mono', monospace;}
  #app{max-width:920px; margin:0 auto; padding:28px 20px 80px;}

  header.top{
    display:flex; align-items:baseline; justify-content:space-between;
    border-bottom:2px solid var(--ink); padding-bottom:14px; margin-bottom:26px;
    flex-wrap:wrap; gap:8px;
  }
  header.top .title{
    font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:26px; letter-spacing:-0.02em;
  }
  header.top .title span{color:var(--copper);}
  header.top .sub{font-family:'IBM Plex Mono', monospace; font-size:12px; color:var(--ink-soft);}

  .btn{
    font-family:'IBM Plex Sans KR', sans-serif; font-size:14px; font-weight:500;
    padding:9px 16px; border-radius:3px; border:1.5px solid var(--ink); background:var(--card);
    color:var(--ink); cursor:pointer; transition:transform .08s ease, background .15s ease;
  }
  .btn:hover{background:var(--ink); color:var(--paper);}
  .btn:active{transform:scale(0.97);}
  .btn.primary{background:var(--ink); color:var(--paper);}
  .btn.primary:hover{background:var(--copper); border-color:var(--copper); color:#fff;}
  .btn.accent{border-color:var(--copper); color:var(--copper);}
  .btn.accent:hover{background:var(--copper); color:#fff;}
  .btn.ghost{border-color:transparent; background:transparent;}
  .btn.ghost:hover{background:var(--border); color:var(--ink);}
  .btn.danger{border-color:var(--danger); color:var(--danger);}
  .btn.danger:hover{background:var(--danger); color:#fff;}
  .btn:disabled{opacity:0.5; cursor:not-allowed;}
  .btn:disabled:hover{background:var(--card); color:var(--ink);}

  .row{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
  .grow{flex:1;}

  /* ---- Project list ---- */
  .project-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:14px; margin-top:18px;}
  .project-card{
    background:var(--card); border:1.5px solid var(--ink); border-radius:4px; padding:16px;
    cursor:pointer; position:relative; transition:box-shadow .15s ease, transform .1s ease;
  }
  .project-card:hover{box-shadow:5px 5px 0 var(--ink); transform:translate(-2px,-2px);}
  .badge{
    display:inline-block; font-family:'IBM Plex Mono',monospace; font-size:11px; padding:2px 8px;
    border-radius:20px; margin-bottom:8px; letter-spacing:.02em;
  }
  .badge.exp{background:var(--teal-soft); color:var(--teal);}
  .badge.code{background:var(--copper-soft); color:#7a3d10;}
  .project-card .pname{font-weight:600; font-size:16px; margin-bottom:6px;}
  .project-card .pmeta{font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--ink-soft);}
  .empty-hint{
    border:1.5px dashed var(--border); border-radius:4px; padding:30px; text-align:center;
    color:var(--ink-soft); font-size:14px; margin-top:18px;
  }

  .new-card{
    border:1.5px dashed var(--ink); border-radius:4px; padding:16px; display:flex; align-items:center;
    justify-content:center; color:var(--ink-soft); cursor:pointer; font-weight:500; min-height:90px;
  }
  .new-card:hover{background:var(--card); color:var(--copper); border-color:var(--copper);}

  /* ---- Forms ---- */
  .panel{background:var(--card); border:1.5px solid var(--ink); border-radius:5px; padding:20px; margin-top:16px;}
  .panel h3{margin:0 0 14px; font-family:'Space Grotesk',sans-serif; font-size:17px;}
  label{display:block; font-size:12.5px; font-weight:600; color:var(--ink-soft); margin-bottom:5px; margin-top:12px; font-family:'IBM Plex Mono',monospace; letter-spacing:.02em;}
  label:first-of-type{margin-top:0;}
  input[type=text], input[type=date], textarea, select{
    width:100%; padding:9px 10px; border:1.3px solid var(--border); border-radius:3px;
    font-family:'IBM Plex Sans KR',sans-serif; font-size:14px; background:#fff; color:var(--ink);
  }
  textarea{resize:vertical; min-height:70px; line-height:1.5;}
  input:focus, textarea:focus, select:focus{outline:2px solid var(--copper); outline-offset:1px; border-color:var(--copper);}
  .type-choice{display:flex; gap:10px; margin-top:2px;}
  .type-opt{
    flex:1; border:1.5px solid var(--border); border-radius:4px; padding:12px; cursor:pointer; text-align:center;
    font-size:13.5px; font-weight:500; transition:all .12s ease;
  }
  .type-opt.selected{border-color:var(--copper); background:var(--copper-soft); color:#7a3d10;}
  .type-opt small{display:block; font-weight:400; color:var(--ink-soft); margin-top:3px; font-size:11.5px;}

  /* ---- Detail view / timeline ---- */
  .detail-header{display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; margin-bottom:6px;}
  .detail-header h2{font-family:'Space Grotesk',sans-serif; margin:0; font-size:21px;}
  .breadcrumb{font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--ink-soft); margin-bottom:10px; cursor:pointer;}
  .breadcrumb:hover{color:var(--copper);}

  .timeline{margin-top:20px; position:relative; padding-left:26px;}
  .timeline::before{content:''; position:absolute; left:7px; top:6px; bottom:6px; width:2px; background:var(--border);}
  .entry{position:relative; margin-bottom:18px;}
  .entry::before{
    content:''; position:absolute; left:-26px; top:6px; width:12px; height:12px; border-radius:50%;
    background:var(--paper); border:2.5px solid var(--copper);
  }
  .entry-card{background:var(--card); border:1.3px solid var(--border); border-radius:4px; padding:14px 16px;}
  .entry-top{display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:space-between;}
  .stamp{
    font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:600; color:var(--copper);
    border:1.5px solid var(--copper); border-radius:3px; padding:2px 8px; transform:rotate(-1.2deg); display:inline-block;
  }
  .entry-title{font-weight:600; font-size:14.5px; margin:8px 0 4px;}
  .entry-summary{font-size:13.5px; line-height:1.6; color:var(--ink); white-space:pre-wrap;}
  .entry-code{
    margin-top:8px; background:#101B22; color:#B7E3C7; font-family:'IBM Plex Mono',monospace; font-size:12px;
    padding:10px 12px; border-radius:4px; white-space:pre-wrap; line-height:1.5;
  }
  #ef-code {
    min-height: 280px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    background: #1a1e21;
    color: #b7e3c7;
    border: 1.5px solid var(--ink);
    line-height: 1.6;
    padding: 12px;
    border-radius: 4px;
  }
  .entry-notes{margin-top:6px; font-size:12.5px; color:var(--ink-soft); font-style:italic;}
  .entry-actions{margin-top:8px; display:flex; gap:6px;}
  .entry-actions .btn{padding:4px 10px; font-size:12px;}

  .photo-grid{display:flex; flex-wrap:wrap; gap:8px; margin-top:10px;}
  .photo-thumb{
    width:110px; height:110px; object-fit:cover; border-radius:4px; border:1.3px solid var(--border);
    cursor:pointer; display:block;
  }
  .photo-thumb-wrap{position:relative; width:110px; height:110px;}
  .photo-thumb-wrap .photo-thumb{width:100%; height:100%; cursor:default;}
  .photo-remove{
    position:absolute; top:-7px; right:-7px; width:22px; height:22px; border-radius:50%;
    background:var(--danger); color:#fff; border:2px solid var(--paper); font-size:14px; line-height:1;
    cursor:pointer; display:flex; align-items:center; justify-content:center; padding:0;
  }
  input[type=file]{
    width:100%; padding:8px 10px; border:1.3px dashed var(--border); border-radius:3px;
    font-family:'IBM Plex Sans KR',sans-serif; font-size:13px; background:#fff; color:var(--ink-soft); cursor:pointer;
  }

  .section-title{font-family:'Space Grotesk',sans-serif; font-size:15px; margin:26px 0 4px; display:flex; align-items:center; gap:8px;}
  .section-title::after{content:''; flex:1; height:1.5px; background:var(--border);}

  /* ---- Report view ---- */
  .report-box{
    background:#fff; border:1.5px solid var(--ink); border-radius:4px; padding:22px 24px; margin-top:16px;
    white-space:pre-wrap; font-size:14.5px; line-height:1.75; min-height:200px;
  }
  .loading{color:var(--ink-soft); font-family:'IBM Plex Mono',monospace; font-size:13px;}
  .format-toggle{display:flex; gap:8px; margin-bottom:10px;}
  .toast{
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff;
    padding:10px 18px; border-radius:4px; font-size:13.5px; opacity:0; pointer-events:none; transition:opacity .25s ease;
    font-family:'IBM Plex Sans KR',sans-serif; z-index:50;
  }
  .toast.show{opacity:1;}
  ::selection{background:var(--copper-soft);}

  /* ---- Auth ---- */
  .auth-wrap{max-width:380px; margin:60px auto 0;}
  .auth-tabs{display:flex; gap:8px; margin-bottom:16px;}
  .auth-tabs .btn{flex:1;}
  .auth-error{color:var(--danger); font-size:13px; margin-top:10px;}
  .user-badge{
    font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--ink-soft);
    display:flex; align-items:center; gap:10px;
  }
</style>
</head>
<body>
<div id="app"><div class="loading">불러오는 중...</div></div>
<div class="toast" id="toast"></div>
<script>
/* ---------------- SUPABASE 설정 ----------------
   Vercel 환경 변수에서 설정값을 비동기로 불러와 초기화합니다.
------------------------------------------------ */
let sb = null;
const PHOTO_BUCKET = 'entry-photos';

const APP_TITLE = "Report Compass";
const FAKE_EMAIL_DOMAIN = 'reportcompass.com';
function usernameToEmail(username){
  return username.trim().toLowerCase().replace(/\s+/g,'') + '@' + FAKE_EMAIL_DOMAIN;
}
function emailToUsername(email){
  return (email||'').split('@')[0];
}
let currentUser = null;
let state = {
  view: 'auth',        // auth | list | new-project | detail | new-entry | report
  authMode: 'login',   // login | signup
  authEmail: '',
  authPassword: '',
  authError: '',
  authLoading: false,
  projects: [],
  currentProjectId: null,
  entries: [],
  reportText: '',
  reportLoading: false,
  formatMode: 'default', // default | custom
  customFormat: '',
  typeChoice: null,
  editingEntryId: null,
  newProjectName: '',
  entryForm: { date:'', title:'', summary:'', code:'', notes:'', photos:[] },
};

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function todayStr(){ const d=new Date(); return d.toISOString().slice(0,10); }
function esc(s){ return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toast._h);
  toast._h = setTimeout(()=>t.classList.remove('show'), 2200);
}

function resizeImageFileToBlob(file, maxDim=1000, quality=0.72){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w > maxDim || h > maxDim){
          if(w >= h){ h = Math.round(h * maxDim / w); w = maxDim; }
          else { w = Math.round(w * maxDim / h); h = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        canvas.toBlob(blob=>{
          if(blob) resolve(blob); else reject(new Error('이미지 변환 실패'));
        }, 'image/jpeg', quality);
      };
      img.onerror = ()=>reject(new Error('이미지를 불러올 수 없습니다.'));
      img.src = e.target.result;
    };
    reader.onerror = ()=>reject(new Error('파일을 읽을 수 없습니다.'));
    reader.readAsDataURL(file);
  });
}

async function loadProjects(){
  const { data, error } = await sb.from('projects')
    .select('*')
    .order('created_at', { ascending:false });
  if(error){ toast('프로젝트 불러오기 오류: ' + error.message); state.projects=[]; return; }
  state.projects = (data||[]).map(p=>({
    id: p.id, name: p.name, type: p.type, createdAt: p.created_at.slice(0,10)
  }));
}

async function createProjectRemote(name, type){
  const { data, error } = await sb.from('projects')
    .insert({ name, type, user_id: currentUser.id })
    .select().single();
  if(error){ toast('프로젝트 생성 오류: ' + error.message); return null; }
  return data;
}

async function deleteProjectRemote(id){
  const { error } = await sb.from('projects').delete().eq('id', id);
  if(error){ toast('프로젝트 삭제 오류: ' + error.message); return false; }
  return true;
}

async function loadEntries(pid){
  const { data, error } = await sb.from('entries')
    .select('*, entry_photos(*)')
    .eq('project_id', pid)
    .order('entry_date', { ascending:false });
  if(error){ toast('기록 불러오기 오류: ' + error.message); state.entries=[]; return; }

  const entries = [];
  for(const row of (data||[])){
    const photoUrls = [];
    for(const ph of (row.entry_photos||[])){
      const { data: signed } = await sb.storage.from(PHOTO_BUCKET).createSignedUrl(ph.storage_path, 3600);
      if(signed) photoUrls.push(signed.signedUrl);
    }
    entries.push({
      id: row.id, date: row.entry_date, title: row.title || '', summary: row.summary,
      codeChanges: row.code_changes || '', notes: row.notes || '', photoUrls
    });
  }
  state.entries = entries;
}

async function saveEntryRemote(projectId, entryData, photoFiles){
  const { data: entry, error } = await sb.from('entries').insert({
    project_id: projectId,
    user_id: currentUser.id,
    entry_date: entryData.date,
    title: entryData.title || null,
    summary: entryData.summary,
    code_changes: entryData.codeChanges || null,
    notes: entryData.notes || null
  }).select().single();
  if(error){ toast('기록 저장 오류: ' + error.message); return null; }

  for(const file of photoFiles){
    try{
      const blob = await resizeImageFileToBlob(file);
      const path = `${currentUser.id}/${entry.id}/${uid()}.jpg`;
      const { error: upErr } = await sb.storage.from(PHOTO_BUCKET).upload(path, blob, { contentType:'image/jpeg' });
      if(upErr){ toast('사진 업로드 오류: ' + upErr.message); continue; }
      await sb.from('entry_photos').insert({ entry_id: entry.id, user_id: currentUser.id, storage_path: path });
    }catch(err){
      toast('사진 처리 오류: ' + err.message);
    }
  }
  return entry;
}

async function deleteEntryRemote(id){
  const { error } = await sb.from('entries').delete().eq('id', id);
  if(error){ toast('기록 삭제 오류: ' + error.message); return false; }
  return true;
}

function currentProject(){
  return state.projects.find(p=>p.id===state.currentProjectId);
}

/* ---------------- RENDER ---------------- */
function render(){
  const app = document.getElementById('app');
  const userInfo = currentUser ? `
    <div class="user-badge">
      ${esc(emailToUsername(currentUser.email))}
      <button class="btn ghost" id="btn-logout">로그아웃</button>
    </div>` : '';
  app.innerHTML = `
    <header class="top">
      <div>
        <div class="title">📓 ${APP_TITLE.replace('Compass','<span>Compass</span>')}</div>
        <div class="sub">프로젝트를 날짜별로 기록하고, 마지막에 보고서로 완성합니다</div>
      </div>
      ${userInfo}
    </header>
    <div id="body"></div>
  `;
  const body = document.getElementById('body');

  if(state.view === 'auth') body.innerHTML = renderAuth();
  else if(state.view === 'list') body.innerHTML = renderList();
  else if(state.view === 'new-project') body.innerHTML = renderNewProject();
  else if(state.view === 'detail') body.innerHTML = renderDetail();
  else if(state.view === 'new-entry') body.innerHTML = renderEntryForm();
  else if(state.view === 'report') body.innerHTML = renderReport();

  bindEvents();
}

function renderAuth(){
  return `
    <div class="auth-wrap">
      <div class="panel">
        <div class="auth-tabs">
          <button class="btn ${state.authMode==='login'?'primary':''}" id="auth-tab-login">로그인</button>
          <button class="btn ${state.authMode==='signup'?'primary':''}" id="auth-tab-signup">회원가입</button>
        </div>
        <label>아이디</label>
        <input type="text" id="auth-email" placeholder="아이디" value="${esc(state.authEmail)}" autocomplete="username">
        <label>비밀번호</label>
        <input type="password" id="auth-password" placeholder="6자 이상" value="${esc(state.authPassword)}" autocomplete="current-password">
        <div class="row" style="margin-top:16px;">
          <button class="btn primary grow" id="auth-submit" ${state.authLoading?'disabled':''}>
            ${state.authLoading ? '처리 중...' : (state.authMode==='login' ? '로그인' : '회원가입')}
          </button>
        </div>
        ${state.authError ? `<div class="auth-error">${esc(state.authError)}</div>` : ''}
        ${state.authMode==='signup' ? `<div class="pmeta" style="margin-top:10px; color:var(--ink-soft);">아이디는 4자 이상, 영문/숫자만 사용해주세요.</div>` : ''}
      </div>
    </div>
  `;
}

function renderList(){
  const cards = state.projects.map(p=>{
    const cls = p.type === 'exp' ? 'exp' : 'code';
    const label = p.type === 'exp' ? '실험 보고서' : '코딩 발명품 보고서';
    return `
    <div class="project-card" data-open="${p.id}">
      <span class="badge ${cls}">${label}</span>
      <div class="pname">${esc(p.name)}</div>
      <div class="pmeta">생성일 ${p.createdAt}</div>
    </div>`;
  }).join('');

  return `
    <div class="project-grid">
      ${cards}
      <div class="new-card" id="btn-new-project">+ 새 프로젝트 만들기</div>
    </div>
    ${state.projects.length===0 ? `<div class="empty-hint">아직 프로젝트가 없습니다. 위 버튼을 눌러 첫 프로젝트를 시작하세요.</div>` : ''}
  `;
}

function renderNewProject(){
  return `
    <div class="breadcrumb" id="back-to-list">&larr; 프로젝트 목록</div>
    <div class="panel">
      <h3>새 프로젝트</h3>
      <label>프로젝트 이름</label>
      <input type="text" id="np-name" placeholder="예: 펀치 스피드 측정 장치" value="${esc(state.newProjectName)}">
      <label>보고서 유형</label>
      <div class="type-choice">
        <div class="type-opt ${state.typeChoice==='exp'?'selected':''}" data-type="exp">
          🧪 실험 보고서<small>가설·실험 과정·결과 중심</small>
        </div>
        <div class="type-opt ${state.typeChoice==='code'?'selected':''}" data-type="code">
          🛠 코딩 발명품(프로젝트) 보고서<small>설계·구현·코드 변경 중심</small>
        </div>
      </div>
      <div class="row" style="margin-top:18px;">
        <button class="btn primary" id="btn-create-project">만들기</button>
        <button class="btn ghost" id="btn-cancel-new">취소</button>
      </div>
    </div>
  `;
}

function renderDetail(){
  const p = currentProject();
  if(!p) return `<div>프로젝트를 찾을 수 없습니다.</div>`;
  const label = p.type === 'exp' ? '실험 보고서' : '코딩 발명품 보고서';

  const entriesHtml = state.entries.map(e=>{
    const codeBlock = e.codeChanges ? `<div class="entry-code">${esc(e.codeChanges)}</div>` : '';
    const notes = e.notes ? `<div class="entry-notes">📌 ${esc(e.notes)}</div>` : '';
    const photos = (e.photoUrls && e.photoUrls.length) ? `
      <div class="photo-grid">
        ${e.photoUrls.map(src=>`<img class="photo-thumb" src="${src}" data-full="${src}">`).join('')}
      </div>` : '';
    return `
    <div class="entry">
      <div class="entry-card">
        <div class="entry-top">
          <span class="stamp mono">${e.date}</span>
          <div class="entry-actions">
            <button class="btn ghost" data-del-entry="${e.id}">삭제</button>
          </div>
        </div>
        ${e.title ? `<div class="entry-title">${esc(e.title)}</div>` : ''}
        <div class="entry-summary">${esc(e.summary)}</div>
        ${codeBlock}
        ${photos}
        ${notes}
      </div>
    </div>`;
  }).join('');

  return `
    <div class="breadcrumb" id="back-to-list">&larr; 프로젝트 목록</div>
    <div class="detail-header">
      <h2>${esc(p.name)}</h2>
      <span class="badge ${p.type==='exp'?'exp':'code'}">${label}</span>
    </div>
    <div class="row">
      <button class="btn primary" id="btn-add-entry">+ 오늘 기록 추가</button>
      <button class="btn accent" id="btn-goto-report" ${state.entries.length===0?'disabled':''}>보고서 생성 →</button>
      <button class="btn danger" id="btn-delete-project" style="margin-left:auto;">프로젝트 삭제</button>
    </div>
    <div class="section-title">기록 타임라인 (${state.entries.length}건)</div>
    ${state.entries.length ? `<div class="timeline">${entriesHtml}</div>` : `<div class="empty-hint">아직 기록이 없습니다. '오늘 기록 추가'로 첫 로그를 남겨보세요.</div>`}
  `;
}

function renderEntryForm(){
  const p = currentProject();
  const isCode = p.type === 'code';
  const f = state.entryForm;

  const photoPreview = f.photos.length ? `
    <div class="photo-grid">
      ${f.photos.map((p,i)=>`
        <div class="photo-thumb-wrap">
          <img class="photo-thumb" src="${p.previewUrl}">
          <button type="button" class="photo-remove" data-remove-photo="${i}">×</button>
        </div>
      `).join('')}
    </div>` : '';

  return `
    <div class="breadcrumb" id="back-to-detail">&larr; ${esc(p.name)}</div>
    <div class="panel">
      <h3>새 기록 추가</h3>
      <label>날짜</label>
      <input type="date" id="ef-date" value="${f.date || todayStr()}">
      <label>제목 (선택)</label>
      <input type="text" id="ef-title" placeholder="예: 초음파 센서 그룹 배선 완료" value="${esc(f.title)}">
      <label>내용 요약</label>
      <textarea id="ef-summary" placeholder="오늘 진행한 작업, 관찰한 내용, 겪은 문제와 해결 과정을 적어주세요.">${esc(f.summary)}</textarea>
      ${isCode ? `
      <label>코드 (선택)</label>
      <textarea id="ef-code" class="mono" placeholder="변경하거나 작성한 코드를 붙여넣으세요.">${esc(f.code)}</textarea>
      ` : ''}
      <label>${isCode ? '사진 (선택, 여러 장 가능)' : '실험 사진 (선택, 여러 장 가능)'}</label>
      <input type="file" id="ef-photos" accept="image/*" multiple>
      <small style="display:block; color:var(--ink-soft); margin-top:4px; margin-bottom:10px; font-family:'IBM Plex Sans KR',sans-serif;">* 여러 장의 이미지를 동시에 드래그하여 선택하거나, 여러 번 나누어 등록할 수 있습니다.</small>
      ${photoPreview}
      <label>비고 (선택)</label>
      <input type="text" id="ef-notes" placeholder="참고 자료, 다음에 해야 할 일 등" value="${esc(f.notes)}">
      <div class="row" style="margin-top:18px;">
        <button class="btn primary" id="btn-save-entry">저장</button>
        <button class="btn ghost" id="btn-cancel-entry">취소</button>
      </div>
    </div>
  `;
}

function renderReport(){
  const p = currentProject();
  return `
    <div class="breadcrumb" id="back-to-detail">&larr; ${esc(p.name)}</div>
    <div class="panel">
      <h3>보고서 형식</h3>
      <div class="format-toggle">
        <button class="btn ${state.formatMode==='default'?'primary':''}" id="fmt-default">기본 형식으로 작성</button>
        <button class="btn ${state.formatMode==='custom'?'primary':''}" id="fmt-custom">형식 직접 입력</button>
      </div>
      ${state.formatMode==='custom' ? `
        <textarea id="custom-format-input" placeholder="원하는 보고서 형식/목차를 붙여넣거나 설명해주세요. 예: '1. 탐구 동기 2. 탐구 과정 3. 결과 및 느낀점 순서로, 학교 생기부 제출용으로 정중한 문어체로 작성해줘'" style="min-height:100px;">${esc(state.customFormat)}</textarea>
      ` : `<div class="pmeta" style="margin-top:6px; color:var(--ink-soft);">유형에 맞는 표준 구성(동기·과정·결과·고찰)으로 자동 작성됩니다.</div>`}
      <div class="row" style="margin-top:16px;">
        <button class="btn accent" id="btn-generate" ${state.reportLoading?'disabled':''}>${state.reportLoading?'생성 중...':'보고서 생성'}</button>
      </div>
    </div>
    ${state.reportLoading ? `<div class="panel"><div class="loading">기록 ${state.entries.length}건을 바탕으로 보고서를 작성하고 있습니다...</div></div>` : ''}
    ${state.reportText ? `
      <div class="section-title">생성된 보고서</div>
      <div class="report-box" id="report-text" contenteditable="true">${esc(state.reportText)}</div>
      <div class="row" style="margin-top:12px;">
        <button class="btn primary" id="btn-copy-report">복사하기</button>
        <button class="btn" id="btn-download-report">텍스트 파일로 저장</button>

/* ---------------- EVENTS ---------------- */
function bindEvents(){
  // auth
  const authTabLogin = document.getElementById('auth-tab-login');
  if(authTabLogin) authTabLogin.onclick = ()=>{ state.authMode='login'; state.authError=''; render(); };
  const authTabSignup = document.getElementById('auth-tab-signup');
  if(authTabSignup) authTabSignup.onclick = ()=>{ state.authMode='signup'; state.authError=''; render(); };
  const authEmailEl = document.getElementById('auth-email');
  if(authEmailEl) authEmailEl.oninput = (e)=>{ state.authEmail = e.target.value; };
  const authPasswordEl = document.getElementById('auth-password');
  if(authPasswordEl) authPasswordEl.oninput = (e)=>{ state.authPassword = e.target.value; };
  const authSubmit = document.getElementById('auth-submit');
  if(authSubmit) authSubmit.onclick = async ()=>{
    const username = document.getElementById('auth-email').value.trim();
    const password = document.getElementById('auth-password').value;
    if(!username || !password){ state.authError='아이디와 비밀번호를 입력해주세요.'; render(); return; }
    if(!/^[a-zA-Z0-9_]{4,}$/.test(username)){ state.authError='아이디는 4자 이상의 영문/숫자/밑줄만 사용할 수 있어요.'; render(); return; }
    const email = usernameToEmail(username);
    state.authLoading = true; state.authError=''; render();
    let result;
    if(state.authMode === 'login'){
      result = await sb.auth.signInWithPassword({ email, password });
    }else{
      result = await sb.auth.signUp({ email, password });
    }
    state.authLoading = false;
    if(result.error){
      state.authError = result.error.message.includes('already registered')
        ? '이미 사용 중인 아이디입니다.'
        : result.error.message;
      render();
      return;
    }
    if(state.authMode === 'signup' && !result.data.session){
      state.authError = '가입은 완료됐지만 로그인이 안 됐어요. Supabase 대시보드 Authentication > Providers > Email에서 "Confirm email"을 꺼주세요.';
      render();
      return;
    }
    currentUser = result.data.user;
    state.authEmail=''; state.authPassword='';
    state.view='list';
    await loadProjects();
    render();
  };
  const btnLogout = document.getElementById('btn-logout');
  if(btnLogout) btnLogout.onclick = async ()=>{
    await sb.auth.signOut();
    currentUser = null;
    state.view = 'auth';
    state.projects = []; state.entries = [];
    render();
  };

  // list
  const btnNew = document.getElementById('btn-new-project');
  if(btnNew) btnNew.onclick = ()=>{ state.view='new-project'; state.typeChoice=null; state.newProjectName=''; render(); };
  document.querySelectorAll('[data-open]').forEach(el=>{
    el.onclick = async ()=>{
      state.currentProjectId = el.getAttribute('data-open');
      state.entries = [];
      state.view='detail'; render();
      await loadEntries(state.currentProjectId);
      state.reportText=''; state.formatMode='default'; state.customFormat='';
      render();
    };
  });

  // new project
  const backList = document.getElementById('back-to-list');
  if(backList) backList.onclick = ()=>{ state.view='list'; render(); };
  const npNameInput = document.getElementById('np-name');
  if(npNameInput) npNameInput.oninput = (e)=>{ state.newProjectName = e.target.value; };
  document.querySelectorAll('.type-opt').forEach(el=>{
    el.onclick = ()=>{
      // capture current input value before re-rendering, so it isn't lost
      const nameField = document.getElementById('np-name');
      if(nameField) state.newProjectName = nameField.value;
      state.typeChoice = el.getAttribute('data-type');
      render();
    };
  });
  const btnCancelNew = document.getElementById('btn-cancel-new');
  if(btnCancelNew) btnCancelNew.onclick = ()=>{ state.newProjectName=''; state.typeChoice=null; state.view='list'; render(); };
  const btnCreate = document.getElementById('btn-create-project');
  if(btnCreate) btnCreate.onclick = async ()=>{
    const name = document.getElementById('np-name').value.trim();
    if(!name){ toast('프로젝트 이름을 입력해주세요.'); return; }
    if(!state.typeChoice){ toast('보고서 유형을 선택해주세요.'); return; }
    btnCreate.disabled = true;
    const proj = await createProjectRemote(name, state.typeChoice);
    btnCreate.disabled = false;
    if(!proj) return;
    state.projects.unshift({ id: proj.id, name: proj.name, type: proj.type, createdAt: proj.created_at.slice(0,10) });
    state.currentProjectId = proj.id;
    state.entries = [];
    state.newProjectName = '';
    state.typeChoice = null;
    state.view = 'detail';
    render();
  };

  // detail
  const backDetail = document.getElementById('back-to-detail');
  if(backDetail) backDetail.onclick = ()=>{ state.view='detail'; render(); };
  const btnAddEntry = document.getElementById('btn-add-entry');
  if(btnAddEntry) btnAddEntry.onclick = ()=>{
    state.entryForm = { date: todayStr(), title:'', summary:'', code:'', notes:'', photos:[] };
    state.view='new-entry'; render();
  };
  const btnGotoReport = document.getElementById('btn-goto-report');
  if(btnGotoReport) btnGotoReport.onclick = ()=>{ state.view='report'; state.reportText=''; render(); };
  const btnDelProject = document.getElementById('btn-delete-project');
  if(btnDelProject) btnDelProject.onclick = async ()=>{
    if(!confirm('이 프로젝트와 모든 기록을 삭제할까요? 되돌릴 수 없습니다.')) return;
    const ok = await deleteProjectRemote(state.currentProjectId);
    if(!ok) return;
    state.projects = state.projects.filter(p=>p.id!==state.currentProjectId);
    state.view='list'; render();
  };
  document.querySelectorAll('[data-del-entry]').forEach(el=>{
    el.onclick = async ()=>{
      const id = el.getAttribute('data-del-entry');
      const ok = await deleteEntryRemote(id);
      if(!ok) return;
      state.entries = state.entries.filter(e=>e.id!==id);
      render();
    };
  });

  // entry form
  const btnCancelEntry = document.getElementById('btn-cancel-entry');
  if(btnCancelEntry) btnCancelEntry.onclick = ()=>{ state.view='detail'; render(); };

  const efDate = document.getElementById('ef-date');
  if(efDate) efDate.oninput = (e)=>{ state.entryForm.date = e.target.value; };
  const efTitle = document.getElementById('ef-title');
  if(efTitle) efTitle.oninput = (e)=>{ state.entryForm.title = e.target.value; };
  const efSummary = document.getElementById('ef-summary');
  if(efSummary) efSummary.oninput = (e)=>{ state.entryForm.summary = e.target.value; };
  const efCode = document.getElementById('ef-code');
  if(efCode) efCode.oninput = (e)=>{ state.entryForm.code = e.target.value; };
  const efNotes = document.getElementById('ef-notes');
  if(efNotes) efNotes.oninput = (e)=>{ state.entryForm.notes = e.target.value; };

  const efPhotos = document.getElementById('ef-photos');
  if(efPhotos) efPhotos.onchange = (e)=>{
    const files = Array.from(e.target.files || []);
    if(!files.length) return;
    for(const file of files){
      state.entryForm.photos.push({ file, previewUrl: URL.createObjectURL(file) });
    }
    render();
  };
  document.querySelectorAll('[data-remove-photo]').forEach(el=>{
    el.onclick = ()=>{
      const idx = parseInt(el.getAttribute('data-remove-photo'), 10);
      const removed = state.entryForm.photos.splice(idx, 1)[0];
      if(removed) URL.revokeObjectURL(removed.previewUrl);
      render();
    };
  });

  const btnSaveEntry = document.getElementById('btn-save-entry');
  if(btnSaveEntry) btnSaveEntry.onclick = async ()=>{
    const f = state.entryForm;
    const date = (document.getElementById('ef-date').value || todayStr());
    const title = document.getElementById('ef-title').value.trim();
    const summary = document.getElementById('ef-summary').value.trim();
    const efCodeEl = document.getElementById('ef-code');
    const codeChanges = efCodeEl ? efCodeEl.value.trim() : '';
    const notes = document.getElementById('ef-notes').value.trim();
    if(!summary){ toast('내용 요약을 입력해주세요.'); return; }
    btnSaveEntry.disabled = true;
    btnSaveEntry.textContent = '저장 중...';
    const photoFiles = f.photos.map(p=>p.file);
    const saved = await saveEntryRemote(state.currentProjectId, { date, title, summary, codeChanges, notes }, photoFiles);
    btnSaveEntry.disabled = false;
    if(!saved) return;
    f.photos.forEach(p=>URL.revokeObjectURL(p.previewUrl));
    state.entryForm = { date:'', title:'', summary:'', code:'', notes:'', photos:[] };
    await loadEntries(state.currentProjectId);
    state.view='detail'; render();
  };

  document.querySelectorAll('.photo-thumb[data-full]').forEach(el=>{
    el.onclick = ()=>{
      window.open(el.getAttribute('data-full'), '_blank');
    };
  });

  // report view
  const fmtDefault = document.getElementById('fmt-default');
  if(fmtDefault) fmtDefault.onclick = ()=>{ state.formatMode='default'; render(); };
  const fmtCustom = document.getElementById('fmt-custom');
  if(fmtCustom) fmtCustom.onclick = ()=>{ state.formatMode='custom'; render(); };
  const customInput = document.getElementById('custom-format-input');
  if(customInput) customInput.oninput = (e)=>{ state.customFormat = e.target.value; };
  const btnGenerate = document.getElementById('btn-generate');
  if(btnGenerate) btnGenerate.onclick = generateReport;
  const btnCopy = document.getElementById('btn-copy-report');
  if(btnCopy) btnCopy.onclick = ()=>{
    const txt = document.getElementById('report-text').innerText;
    navigator.clipboard.writeText(txt).then(()=>toast('클립보드에 복사했습니다.'));
  };
  const btnDownload = document.getElementById('btn-download-report');
  if(btnDownload) btnDownload.onclick = ()=>{
    const txt = document.getElementById('report-text').innerText;
    const p = currentProject();
    const blob = new Blob([txt], {type:'text/plain;charset=utf-8'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = (p ? p.name : 'report') + '_보고서.txt';
    a.click();
  };
}

async function generateReport(){
  const p = currentProject();
  if(!p) return;
  if(state.formatMode==='custom'){
    const el = document.getElementById('custom-format-input');
    if(el) state.customFormat = el.value.trim();
    if(!state.customFormat){ toast('원하는 형식을 입력해주세요.'); return; }
  }
  state.reportLoading = true;
  state.reportText = '';
  render();

  const typeLabel = p.type==='exp' ? '실험 보고서' : '코딩으로 만든 발명품(프로젝트) 보고서';
  const logText = state.entries.slice().reverse().map(e=>{
    let block = `[${e.date}]`;
    if(e.title) block += ` ${e.title}`;
    block += `\n내용: ${e.summary}`;
    if(p.type==='code' && e.codeChanges) block += `\n코드: ${e.codeChanges}`;
    if(e.photoUrls && e.photoUrls.length) block += `\n(사진 ${e.photoUrls.length}장 첨부됨)`;
    if(e.notes) block += `\n비고: ${e.notes}`;
    return block;
  }).join('\n\n');

  const formatInstruction = state.formatMode==='custom'
    ? `사용자가 요청한 다음 형식/목차를 반드시 따라서 작성하세요:\n"""\n${state.customFormat}\n"""`
    : (p.type==='exp'
        ? '다음 표준 실험 보고서 구성으로 작성하세요: 1) 탐구 동기 및 목적, 2) 탐구(실험) 과정, 3) 결과 및 데이터 정리, 4) 결론 및 느낀점/향후 탐구 방향.'
        : '다음 표준 프로젝트 보고서 구성으로 작성하세요: 1) 프로젝트 개요 및 목적, 2) 설계 및 구현 과정(주요 기술적 의사결정 포함), 3) 주요 코드/회로 변경 내역 요약, 4) 결과 및 느낀점, 5) 향후 개선 방향.');

  const prompt = `너는 한국 고등학생의 ${typeLabel} 작성을 돕는 도우미야. 아래는 날짜별로 기록된 프로젝트 로그야. 이 로그들을 바탕으로 하나의 완성된 보고서를 한국어로 작성해줘.

프로젝트 이름: ${p.name}
보고서 유형: ${typeLabel}

${formatInstruction}

작성 시 유의사항:
- 로그에 있는 사실만 사용하고 지어내지 마.
- 문어체로, 학교 제출용 보고서에 어울리는 정중하고 간결한 문체를 사용해.
- 날짜를 나열하기보다 하나의 이어지는 이야기처럼 자연스럽게 구성해.
- 보고서 본문만 출력하고, 서두의 인사말이나 부가 설명은 하지 마.

--- 프로젝트 로그 ---
${logText}
`;

  try{
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });
    const data = await response.json();
    const text = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n').trim();
    state.reportText = text || '보고서를 생성하지 못했습니다. 다시 시도해주세요.';
  }catch(e){
    state.reportText = '오류가 발생했습니다: ' + e.message;
  }
  state.reportLoading = false;
  render();
}

/* ---------------- INIT ---------------- */
(async function init(){
  try {
    const res = await fetch('/api/config');
    if (!res.ok) throw new Error('API response not OK');
    const config = await res.json();
    if (!config.supabaseUrl || !config.supabaseAnonKey) {
      throw new Error('Supabase URL or Anon Key is missing in Vercel configuration.');
    }
    sb = window.supabase.createClient(config.supabaseUrl, config.supabaseAnonKey);
  } catch (err) {
    console.error('Failed to initialize Supabase via API:', err);
    document.getElementById('app').innerHTML = `
      <div class="panel" style="max-width: 500px; margin: 60px auto; text-align: center; padding: 30px;">
        <h3 style="color: var(--danger); margin-bottom: 12px;">Supabase 설정 오류</h3>
        <p style="font-size: 14px; color: var(--ink-soft); line-height: 1.6; margin-bottom: 20px;">
          Vercel 환경 변수(SUPABASE_URL, SUPABASE_ANON_KEY)가 올바르게 설정되지 않았거나 API 호출에 실패했습니다.<br>
          Vercel 프로젝트 설정의 Environment Variables를 확인해 주세요.
        </p>
        <button class="btn primary" onclick="location.reload()">다시 시도</button>
      </div>
    `;
    return;
  }

  const { data: { session } } = await sb.auth.getSession();
  if(session && session.user){
    currentUser = session.user;
    state.view = 'list';
    await loadProjects();
  }
  render();

  sb.auth.onAuthStateChange((event, session)=>{
    if(event === 'SIGNED_OUT'){
      currentUser = null;
      state.view = 'auth';
      render();
    }
  });
})();
</script>
